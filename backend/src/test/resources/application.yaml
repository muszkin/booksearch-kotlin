ktor:
  deployment:
    port: 8080
  application:
    modules:
      - pl.fairydeck.booksearch.ApplicationKt.module

database:
  path: ":memory:"

jwt:
  secret: "test-secret-key-that-is-long-enough-for-hmac256"
  issuer: "booksearch-test"
  audience: "booksearch-test-audience"
  accessTokenExpirationMs: 3600000
  refreshTokenExpirationMs: 2592000000

scraper:
  cacheTtlDays: 7
  requestDelayMs: 100
  maxRetries: 0
  backoffMultiplier: 1.0
  solvearrUrl: "http://localhost:8191"
  userAgent: "TestAgent/1.0"

mirror:
  domains: "annas-archive.gd,annas-archive.pk"
  refreshIntervalHours: 24
