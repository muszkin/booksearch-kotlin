ktor:
  deployment:
    port: "$SERVER_PORT:8080"
  application:
    modules:
      - pl.fairydeck.booksearch.ApplicationKt.module

database:
  path: "$DATABASE_PATH:./data/booksearch.db"

jwt:
  secret: "$JWT_SECRET:dev-secret-change-in-production"
  issuer: "$JWT_ISSUER:booksearch"
  audience: "$JWT_AUDIENCE:booksearch-users"
  accessTokenExpirationMs: 3600000
  refreshTokenExpirationMs: 2592000000
