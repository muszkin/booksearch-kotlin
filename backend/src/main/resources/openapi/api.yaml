openapi: 3.0.3
info:
  title: BookSearch v2 API
  version: 0.1.0
  description: API for BookSearch v2 - e-book search and library management

paths:
  /api/auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Validation error
        '409':
          description: Email already exists

  /api/auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Authenticate user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Invalid credentials

  /api/auth/refresh:
    post:
      operationId: refreshToken
      tags: [auth]
      summary: Refresh access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshResponse'
        '401':
          description: Invalid or expired refresh token

  /api/auth/password-reset-request:
    post:
      operationId: requestPasswordReset
      tags: [auth]
      summary: Request password reset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetRequestBody'
      responses:
        '200':
          description: Reset email sent if account exists

  /api/auth/password-reset:
    post:
      operationId: resetPassword
      tags: [auth]
      summary: Reset password using token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetBody'
      responses:
        '200':
          description: Password reset successful
        '400':
          description: Invalid or expired token

  /api/auth/password:
    put:
      operationId: changeOwnPassword
      tags: [auth]
      summary: Change own password (authenticated)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangeOwnPasswordRequest'
      responses:
        '200':
          description: Password changed
        '401':
          description: Not authenticated
        '400':
          description: Invalid current password

  /api/auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout and revoke refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '200':
          description: Logged out

  /api/auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Return the authenticated user's profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          description: Missing or expired access token
        '404':
          description: User no longer exists

  /api/admin/registration:
    put:
      operationId: toggleRegistration
      tags: [admin]
      summary: Enable or disable user registration (super-admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ToggleRegistrationRequest'
      responses:
        '200':
          description: Registration setting updated
        '403':
          description: Not authorized

  /api/admin/users:
    get:
      operationId: listUsers
      tags: [admin]
      summary: List all users (super-admin)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of all users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserResponse'
        '403':
          description: Not authorized
    post:
      operationId: createUser
      tags: [admin]
      summary: Create a new user (super-admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '403':
          description: Not authorized
        '409':
          description: Email already exists

  /api/search:
    get:
      operationId: searchBooks
      tags: [search]
      summary: Search for books
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Search query
        - name: lang
          in: query
          schema:
            type: string
            default: pl
          description: Book language filter
        - name: ext
          in: query
          schema:
            type: string
            default: epub
          description: Book format filter
        - name: page
          in: query
          schema:
            type: integer
            default: 1
          description: Page number
        - name: maxPages
          in: query
          schema:
            type: integer
            default: 3
            minimum: 1
            maximum: 10
          description: Maximum pages to scrape
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
        '400':
          description: Missing or invalid query parameters
        '401':
          description: Not authenticated

  /api/library:
    get:
      operationId: getUserLibrary
      tags: [library]
      summary: Get user's library (paginated)
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paginated library list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LibraryListResponse'
        '401':
          description: Not authenticated

    post:
      operationId: addToLibrary
      tags: [library]
      summary: Add a book to user's library
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddToLibraryRequest'
      responses:
        '201':
          description: Book added to library
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LibraryBook'
        '404':
          description: Book not found
        '409':
          description: Book already in library with this format

  /api/library/{id}:
    delete:
      operationId: removeFromLibrary
      tags: [library]
      summary: Remove a book from user's library
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Entry removed
        '404':
          description: Entry not found

  /api/library/batch-download:
    post:
      operationId: batchDownload
      tags: [library]
      summary: Download multiple library books as a ZIP archive
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchDownloadRequest'
      responses:
        '200':
          description: ZIP file stream
          content:
            application/zip:
              schema:
                type: string
                format: binary
        '401':
          description: Not authenticated
        '422':
          description: Empty ID list

  /api/library/check:
    get:
      operationId: checkOwnership
      tags: [library]
      summary: Check ownership for given book MD5s
      security:
        - bearerAuth: []
      parameters:
        - name: md5
          in: query
          required: true
          schema:
            type: string
          description: Comma-separated list of book MD5 hashes
      responses:
        '200':
          description: Ownership info per MD5
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  $ref: '#/components/schemas/OwnershipInfo'
        '401':
          description: Not authenticated

  /api/convert/{libraryId}:
    post:
      operationId: startConversion
      tags: [convert]
      summary: Start format conversion for a library book
      security:
        - bearerAuth: []
      parameters:
        - name: libraryId
          in: path
          required: true
          schema:
            type: integer
        - name: target
          in: query
          required: true
          schema:
            type: string
            enum: [epub, mobi, pdf]
          description: Target format for conversion
      responses:
        '202':
          description: Conversion queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversionStartedResponse'
        '401':
          description: Not authenticated
        '404':
          description: Library entry not found
        '422':
          description: Validation error (same format, unsupported format)

  /api/convert/status/{jobId}:
    get:
      operationId: getConversionStatus
      tags: [convert]
      summary: Get conversion job status
      security:
        - bearerAuth: []
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Conversion status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversionStatusResponse'
        '401':
          description: Not authenticated
        '404':
          description: Conversion job not found

  /api/deliver/{libraryId}:
    post:
      operationId: deliverBook
      tags: [deliver]
      summary: Deliver a library book to a device via email
      security:
        - bearerAuth: []
      parameters:
        - name: libraryId
          in: path
          required: true
          schema:
            type: integer
        - name: device
          in: query
          required: true
          schema:
            type: string
            enum: [kindle, pocketbook]
          description: Target device for delivery
      responses:
        '200':
          description: Delivery result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeliveryResponse'
        '401':
          description: Not authenticated
        '404':
          description: Library entry not found
        '422':
          description: SMTP not configured for device

  /api/deliveries:
    get:
      operationId: getUserDeliveries
      tags: [deliver]
      summary: Get all deliveries for authenticated user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of deliveries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DeliveryRecord'
        '401':
          description: Not authenticated

  /api/deliveries/{bookMd5}:
    get:
      operationId: getDeliveriesForBook
      tags: [deliver]
      summary: Get deliveries for a specific book
      security:
        - bearerAuth: []
      parameters:
        - name: bookMd5
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deliveries for this book
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DeliveryRecord'
        '401':
          description: Not authenticated

  /api/settings:
    get:
      operationId: getAllSettings
      tags: [settings]
      summary: Get all device settings for authenticated user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: All device settings (passwords redacted)
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  $ref: '#/components/schemas/DeviceSettingsResponse'
        '401':
          description: Not authenticated

  /api/settings/{device}:
    get:
      operationId: getDeviceSettings
      tags: [settings]
      summary: Get SMTP settings for a specific device
      security:
        - bearerAuth: []
      parameters:
        - name: device
          in: path
          required: true
          schema:
            type: string
            enum: [kindle, pocketbook]
      responses:
        '200':
          description: Device settings (password redacted)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceSettingsResponse'
        '401':
          description: Not authenticated
        '404':
          description: Settings not found for device
        '422':
          description: Invalid device name
    put:
      operationId: saveDeviceSettings
      tags: [settings]
      summary: Save SMTP settings for a specific device
      security:
        - bearerAuth: []
      parameters:
        - name: device
          in: path
          required: true
          schema:
            type: string
            enum: [kindle, pocketbook]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceSettingsRequest'
      responses:
        '200':
          description: Settings saved
        '401':
          description: Not authenticated
        '422':
          description: Invalid device name
    delete:
      operationId: deleteDeviceSettings
      tags: [settings]
      summary: Delete SMTP settings for a specific device
      security:
        - bearerAuth: []
      parameters:
        - name: device
          in: path
          required: true
          schema:
            type: string
            enum: [kindle, pocketbook]
      responses:
        '200':
          description: Settings deleted
        '401':
          description: Not authenticated
        '422':
          description: Invalid device name

  /api/auth/registration-status:
    get:
      operationId: getRegistrationStatus
      tags: [auth]
      summary: Check if user registration is enabled (public)
      responses:
        '200':
          description: Registration status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistrationStatusResponse'

  /api/download/jobs:
    get:
      operationId: getDownloadJobs
      tags: [download]
      summary: Get paginated list of download jobs for authenticated user
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
          description: Filter by job status
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paginated download job list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DownloadJobListResponse'
        '401':
          description: Not authenticated

  /api/download/{jobId}/cancel:
    patch:
      operationId: cancelDownloadJob
      tags: [download]
      summary: Cancel a queued or active download job
      security:
        - bearerAuth: []
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Job cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CancelJobResponse'
        '401':
          description: Not authenticated
        '404':
          description: Job not found or not owned by user
        '422':
          description: Job cannot be cancelled (not in cancellable state)

  /api/download/{md5}:
    post:
      operationId: startDownload
      tags: [download]
      summary: Start downloading a book by MD5
      security:
        - bearerAuth: []
      parameters:
        - name: md5
          in: path
          required: true
          schema:
            type: string
      responses:
        '202':
          description: Download queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DownloadStartedResponse'
        '401':
          description: Not authenticated
        '404':
          description: Book not found

  /api/download/status/{jobId}:
    get:
      operationId: getDownloadStatus
      tags: [download]
      summary: Get download job status
      security:
        - bearerAuth: []
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Download job status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DownloadStatusResponse'
        '401':
          description: Not authenticated
        '404':
          description: Download job not found

  /api/logs/activity:
    get:
      operationId: getActivityLogs
      tags: [logs]
      summary: Get activity logs for authenticated user
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
        - name: type
          in: query
          schema:
            type: string
          description: Filter by action type
      responses:
        '200':
          description: Paginated activity log list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivityLogListResponse'
        '401':
          description: Not authenticated

  /api/logs/requests:
    get:
      operationId: getRequestLogs
      tags: [logs]
      summary: Get request logs (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
        - name: method
          in: query
          schema:
            type: string
        - name: path
          in: query
          schema:
            type: string
        - name: statusCode
          in: query
          schema:
            type: integer
        - name: from
          in: query
          schema:
            type: string
          description: ISO-8601 date-time filter (from)
        - name: to
          in: query
          schema:
            type: string
          description: ISO-8601 date-time filter (to)
      responses:
        '200':
          description: Paginated request log list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestLogListResponse'
        '401':
          description: Not authenticated
        '403':
          description: Not authorized (admin only)

  /api/admin/users/{id}/password:
    put:
      operationId: changeUserPassword
      tags: [admin]
      summary: Change a user's password (super-admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: Password changed
        '403':
          description: Not authorized
        '404':
          description: User not found

  /api/admin/users/{id}/impersonate:
    post:
      operationId: impersonateUser
      tags: [admin]
      summary: Start impersonating a user (super-admin only)
      description: |
        Admin impersonation start; SUPER_ADMIN only. Returns tokens + UserResponse with actAs* populated.
        The returned tokens grant an impersonation session (access TTL 30 min, refresh TTL 1 h,
        non-sliding absolute cap). Rejected if target is self, another super admin, or inactive.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Impersonation session started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Not authenticated
        '403':
          description: Not authorized (not super-admin, or target is super-admin)
        '404':
          description: Target user not found
        '422':
          description: Invalid target (self, or inactive)

  /api/admin/impersonate/stop:
    post:
      operationId: stopImpersonation
      tags: [admin]
      summary: Return to admin identity (end impersonation)
      description: |
        End impersonation session, restore admin identity with fresh tokens.
        Revokes the impersonation refresh token and mints a fresh admin access + refresh pair
        (standard TTL). Gated by the presence of original_admin_id JWT claim on the current
        access token. Failing for a non-impersonated session returns 403.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
                  description: Current impersonation refresh token to revoke.
      responses:
        '200':
          description: Admin identity restored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Not authenticated or refresh token invalid
        '403':
          description: Current session is not an impersonation session
        '404':
          description: Admin user not found

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    RegisterRequest:
      type: object
      required: [email, password, displayName]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
          maxLength: 128
        displayName:
          type: string
          minLength: 1
          maxLength: 100

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
          maxLength: 128

    LoginResponse:
      type: object
      required: [accessToken, refreshToken, user]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        user:
          $ref: '#/components/schemas/UserResponse'

    RefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    RefreshResponse:
      type: object
      required: [accessToken, refreshToken, user]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        user:
          $ref: '#/components/schemas/UserResponse'

    PasswordResetRequestBody:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    PasswordResetBody:
      type: object
      required: [token, newPassword]
      properties:
        token:
          type: string
        newPassword:
          type: string
          minLength: 8
          maxLength: 128

    ChangeOwnPasswordRequest:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
          minLength: 8
          maxLength: 128
        newPassword:
          type: string
          minLength: 8
          maxLength: 128

    LogoutRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    ToggleRegistrationRequest:
      type: object
      required: [enabled]
      properties:
        enabled:
          type: boolean

    CreateUserRequest:
      type: object
      required: [email, password, displayName]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
          maxLength: 128
        displayName:
          type: string
          minLength: 1
          maxLength: 100

    ChangePasswordRequest:
      type: object
      required: [newPassword]
      properties:
        newPassword:
          type: string
          minLength: 8
          maxLength: 128
        sendLoginLink:
          type: boolean
          default: false

    SearchResponse:
      type: object
      required: [results, totalResults, query]
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/BookResult'
        totalResults:
          type: integer
        query:
          type: string

    BookResult:
      type: object
      required: [md5, title, author, language, format, fileSize, detailUrl, coverUrl, publisher, year, description, matchType, ownedFormats]
      properties:
        md5:
          type: string
        title:
          type: string
        author:
          type: string
        language:
          type: string
        format:
          type: string
        fileSize:
          type: string
        detailUrl:
          type: string
        coverUrl:
          type: string
        publisher:
          type: string
        year:
          type: string
        description:
          type: string
        matchType:
          type: string
          enum: [exact, title, author, none]
        ownedFormats:
          type: array
          items:
            type: string

    OwnershipInfo:
      type: object
      required: [matchType, ownedFormats]
      properties:
        matchType:
          type: string
          enum: [exact, title, author, none]
        ownedFormats:
          type: array
          items:
            type: string

    AddToLibraryRequest:
      type: object
      required: [bookMd5, format]
      properties:
        bookMd5:
          type: string
        format:
          type: string

    LibraryBook:
      type: object
      required: [id, bookMd5, format, addedAt, title, author, language, fileSize, detailUrl, coverUrl, publisher, year, description]
      properties:
        id:
          type: integer
        bookMd5:
          type: string
        format:
          type: string
        filePath:
          type: string
          nullable: true
        addedAt:
