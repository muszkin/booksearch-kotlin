openapi: 3.0.3
info:
  title: BookSearch v2 API
  version: 0.1.0
  description: API for BookSearch v2 - e-book search and library management

paths:
  /api/auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Validation error
        '409':
          description: Email already exists

  /api/auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Authenticate user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Invalid credentials

  /api/auth/refresh:
    post:
      operationId: refreshToken
      tags: [auth]
      summary: Refresh access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshResponse'
        '401':
          description: Invalid or expired refresh token

  /api/auth/password-reset-request:
    post:
      operationId: requestPasswordReset
      tags: [auth]
      summary: Request password reset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetRequestBody'
      responses:
        '200':
          description: Reset email sent if account exists

  /api/auth/password-reset:
    post:
      operationId: resetPassword
      tags: [auth]
      summary: Reset password using token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetBody'
      responses:
        '200':
          description: Password reset successful
        '400':
          description: Invalid or expired token

  /api/auth/password:
    put:
      operationId: changeOwnPassword
      tags: [auth]
      summary: Change own password (authenticated)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangeOwnPasswordRequest'
      responses:
        '200':
          description: Password changed
        '401':
          description: Not authenticated
        '400':
          description: Invalid current password

  /api/auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout and revoke refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '200':
          description: Logged out

  /api/admin/registration:
    put:
      operationId: toggleRegistration
      tags: [admin]
      summary: Enable or disable user registration (super-admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ToggleRegistrationRequest'
      responses:
        '200':
          description: Registration setting updated
        '403':
          description: Not authorized

  /api/admin/users:
    post:
      operationId: createUser
      tags: [admin]
      summary: Create a new user (super-admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '403':
          description: Not authorized
        '409':
          description: Email already exists

  /api/search:
    get:
      operationId: searchBooks
      tags: [search]
      summary: Search for books
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Search query
        - name: lang
          in: query
          schema:
            type: string
            default: pl
          description: Book language filter
        - name: ext
          in: query
          schema:
            type: string
            default: epub
          description: Book format filter
        - name: page
          in: query
          schema:
            type: integer
            default: 1
          description: Page number
        - name: maxPages
          in: query
          schema:
            type: integer
            default: 3
            minimum: 1
            maximum: 10
          description: Maximum pages to scrape
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
        '400':
          description: Missing or invalid query parameters
        '401':
          description: Not authenticated

  /api/library:
    get:
      operationId: getUserLibrary
      tags: [library]
      summary: Get user's library (paginated)
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paginated library list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LibraryListResponse'
        '401':
          description: Not authenticated

    post:
      operationId: addToLibrary
      tags: [library]
      summary: Add a book to user's library
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddToLibraryRequest'
      responses:
        '201':
          description: Book added to library
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LibraryBook'
        '404':
          description: Book not found
        '409':
          description: Book already in library with this format

  /api/library/{id}:
    delete:
      operationId: removeFromLibrary
      tags: [library]
      summary: Remove a book from user's library
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Entry removed
        '404':
          description: Entry not found

  /api/library/check:
    get:
      operationId: checkOwnership
      tags: [library]
      summary: Check ownership for given book MD5s
      security:
        - bearerAuth: []
      parameters:
        - name: md5
          in: query
          required: true
          schema:
            type: string
          description: Comma-separated list of book MD5 hashes
      responses:
        '200':
          description: Ownership info per MD5
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  $ref: '#/components/schemas/OwnershipInfo'
        '401':
          description: Not authenticated

  /api/admin/users/{id}/password:
    put:
      operationId: changeUserPassword
      tags: [admin]
      summary: Change a user's password (super-admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: Password changed
        '403':
          description: Not authorized
        '404':
          description: User not found

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    RegisterRequest:
      type: object
      required: [email, password, displayName]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
          maxLength: 128
        displayName:
          type: string
          minLength: 1
          maxLength: 100

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
          maxLength: 128

    LoginResponse:
      type: object
      required: [accessToken, refreshToken, user]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        user:
          $ref: '#/components/schemas/UserResponse'

    RefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    RefreshResponse:
      type: object
      required: [accessToken]
      properties:
        accessToken:
          type: string

    PasswordResetRequestBody:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    PasswordResetBody:
      type: object
      required: [token, newPassword]
      properties:
        token:
          type: string
        newPassword:
          type: string
          minLength: 8
          maxLength: 128

    ChangeOwnPasswordRequest:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
          minLength: 8
          maxLength: 128
        newPassword:
          type: string
          minLength: 8
          maxLength: 128

    LogoutRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    ToggleRegistrationRequest:
      type: object
      required: [enabled]
      properties:
        enabled:
          type: boolean

    CreateUserRequest:
      type: object
      required: [email, password, displayName]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
          maxLength: 128
        displayName:
          type: string
          minLength: 1
          maxLength: 100

    ChangePasswordRequest:
      type: object
      required: [newPassword]
      properties:
        newPassword:
          type: string
          minLength: 8
          maxLength: 128
        sendLoginLink:
          type: boolean
          default: false

    SearchResponse:
      type: object
      required: [results, totalResults, query]
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/BookResult'
        totalResults:
          type: integer
        query:
          type: string

    BookResult:
      type: object
      required: [md5, title, author, language, format, fileSize, detailUrl, coverUrl, publisher, year, description, matchType, ownedFormats]
      properties:
        md5:
          type: string
        title:
          type: string
        author:
          type: string
        language:
          type: string
        format:
          type: string
        fileSize:
          type: string
        detailUrl:
          type: string
        coverUrl:
          type: string
        publisher:
          type: string
        year:
          type: string
        description:
          type: string
        matchType:
          type: string
          enum: [exact, title, author, none]
        ownedFormats:
          type: array
          items:
            type: string

    OwnershipInfo:
      type: object
      required: [matchType, ownedFormats]
      properties:
        matchType:
          type: string
          enum: [exact, title, author, none]
        ownedFormats:
          type: array
          items:
            type: string

    AddToLibraryRequest:
      type: object
      required: [bookMd5, format]
      properties:
        bookMd5:
          type: string
        format:
          type: string

    LibraryBook:
      type: object
      required: [id, bookMd5, format, addedAt, title, author, language, fileSize, detailUrl, coverUrl, publisher, year, description]
      properties:
        id:
          type: integer
        bookMd5:
          type: string
        format:
          type: string
        filePath:
          type: string
          nullable: true
        addedAt:
          type: string
        title:
          type: string
        author:
          type: string
        language:
          type: string
        fileSize:
          type: string
        detailUrl:
          type: string
        coverUrl:
          type: string
        publisher:
          type: string
        year:
          type: string
        description:
          type: string

    LibraryListResponse:
      type: object
      required: [items, totalItems, page, pageSize, totalPages]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/LibraryBook'
        totalItems:
          type: integer
          format: int64
        page:
          type: integer
        pageSize:
          type: integer
        totalPages:
          type: integer

    UserResponse:
      type: object
      required: [id, email, displayName, isSuperAdmin, isActive, forcePasswordChange, createdAt]
      properties:
        id:
          type: integer
          format: int64
        email:
          type: string
        displayName:
          type: string
        isSuperAdmin:
          type: boolean
        isActive:
          type: boolean
        forcePasswordChange:
          type: boolean
        createdAt:
          type: string
          description: ISO-8601 timestamp
