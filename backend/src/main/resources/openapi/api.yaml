openapi: 3.0.3
info:
  title: BookSearch v2 API
  version: 0.1.0
  description: API for BookSearch v2 - e-book search and library management

paths:
  /api/auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Validation error
        '409':
          description: Email already exists

  /api/auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Authenticate user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Invalid credentials

  /api/auth/refresh:
    post:
      operationId: refreshToken
      tags: [auth]
      summary: Refresh access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshResponse'
        '401':
          description: Invalid or expired refresh token

  /api/auth/password-reset-request:
    post:
      operationId: requestPasswordReset
      tags: [auth]
      summary: Request password reset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetRequestBody'
      responses:
        '200':
          description: Reset email sent if account exists

  /api/auth/password-reset:
    post:
      operationId: resetPassword
      tags: [auth]
      summary: Reset password using token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetBody'
      responses:
        '200':
          description: Password reset successful
        '400':
          description: Invalid or expired token

  /api/auth/password:
    put:
      operationId: changeOwnPassword
      tags: [auth]
      summary: Change own password (authenticated)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangeOwnPasswordRequest'
      responses:
        '200':
          description: Password changed
        '401':
          description: Not authenticated
        '400':
          description: Invalid current password

  /api/auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout and revoke refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '200':
          description: Logged out

  /api/admin/registration:
    put:
      operationId: toggleRegistration
      tags: [admin]
      summary: Enable or disable user registration (super-admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ToggleRegistrationRequest'
      responses:
        '200':
          description: Registration setting updated
        '403':
          description: Not authorized

  /api/admin/users:
    post:
      operationId: createUser
      tags: [admin]
      summary: Create a new user (super-admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '403':
          description: Not authorized
        '409':
          description: Email already exists

  /api/admin/users/{id}/password:
    put:
      operationId: changeUserPassword
      tags: [admin]
      summary: Change a user's password (super-admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: Password changed
        '403':
          description: Not authorized
        '404':
          description: User not found

components:
  schemas:
    RegisterRequest:
      type: object
      required: [email, password, displayName]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
          maxLength: 128
        displayName:
          type: string
          minLength: 1
          maxLength: 100

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
          maxLength: 128

    LoginResponse:
      type: object
      required: [accessToken, refreshToken, user]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        user:
          $ref: '#/components/schemas/UserResponse'

    RefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    RefreshResponse:
      type: object
      required: [accessToken]
      properties:
        accessToken:
          type: string

    PasswordResetRequestBody:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    PasswordResetBody:
      type: object
      required: [token, newPassword]
      properties:
        token:
          type: string
        newPassword:
          type: string
          minLength: 8
          maxLength: 128

    ChangeOwnPasswordRequest:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
          minLength: 8
          maxLength: 128
        newPassword:
          type: string
          minLength: 8
          maxLength: 128

    LogoutRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    ToggleRegistrationRequest:
      type: object
      required: [enabled]
      properties:
        enabled:
          type: boolean

    CreateUserRequest:
      type: object
      required: [email, password, displayName]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
          maxLength: 128
        displayName:
          type: string
          minLength: 1
          maxLength: 100

    ChangePasswordRequest:
      type: object
      required: [newPassword]
      properties:
        newPassword:
          type: string
          minLength: 8
          maxLength: 128
        sendLoginLink:
          type: boolean
          default: false

    UserResponse:
      type: object
      required: [id, email, displayName, isSuperAdmin, isActive, forcePasswordChange, createdAt]
      properties:
        id:
          type: integer
          format: int64
        email:
          type: string
        displayName:
          type: string
        isSuperAdmin:
          type: boolean
        isActive:
          type: boolean
        forcePasswordChange:
          type: boolean
        createdAt:
          type: string
          description: ISO-8601 timestamp
